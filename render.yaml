services:
  - type: web
    name: ethereal-engine-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GENERATION_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: local
      - key: PRELOAD_EMBEDDING_MODEL
        value: "false"
      - key: QUERY_UNDERSTANDING_PROVIDER
        value: rule
      - key: CHROMA_PATH
        value: /tmp/chroma_db
      - key: UPLOAD_PATH
        value: /tmp/uploads
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
