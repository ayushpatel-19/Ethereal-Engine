<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ethereal Engine</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#252a37",
              "surface-container-highest": "#303542",
              background: "#0e131f",
              "surface-container-low": "#161b28",
              "surface-container-lowest": "#090e1a",
              "surface-container": "#1b1f2c",
              surface: "#0e131f",
              "on-surface": "#dee2f4",
              "on-surface-variant": "#c1c6d7",
              "outline-variant": "#414754",
              outline: "#8b90a0",
              primary: "#a6c8ff",
              "primary-container": "#3192fc",
              "on-primary-container": "#002a53",
              secondary: "#d2bbff",
              "secondary-container": "#552ba0",
              tertiary: "#ffb875",
              "tertiary-container": "#d57a00",
              error: "#ffb4ab",
              "surface-bright": "#343946"
            },
            fontFamily: {
              headline: ["Space Grotesk"],
              body: ["Inter"],
              label: ["Space Grotesk"],
              mono: ["JetBrains Mono", "monospace"]
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-background text-on-surface font-body min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
