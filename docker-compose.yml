version: "3.9"

services:
  # ─── Ollama — Local LLM + Embeddings ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ethereal-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support — comment out if no GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Redis — Query cache + session store ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ethereal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethereal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - uploaded_docs:/app/uploads
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - CHROMA_PATH=/app/chroma_db
      - UPLOAD_PATH=/app/uploads
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500
    depends_on:
      - ollama
      - redis
    restart: unless-stopped

  # ─── Nginx — Serves Frontend + proxies /api to backend ──────────────────────
  frontend:
    image: nginx:alpine
    container_name: ethereal-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data:
  chroma_data:
  uploaded_docs:
